<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IMAGIN - Engine & Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-layout">
        <!-- SECCIÓN 1: PANTALLA DE JUEGO (Lo que ve el usuario) -->
        <section class="game-view">
            <div class="game-header">
                <h2>🎮 MODO JUEGO</h2>
                <div class="stats">
                    ❤️ Vida: <span id="val-vida">100</span> | ⭐ Puntos: <span id="val-puntos">0</span>
                </div>
            </div>
            <div id="pantalla-narrativa">
                <p id="texto-escena">Carga una historia para comenzar...</p>
                <div id="opciones-contenedor"></div>
            </div>
        </section>

        <!-- SECCIÓN 2: PANEL DE CONTROL (Tu consola de robustez) -->
        <section class="dev-view">
            <h3>🛠️ PANEL DE DESARROLLADOR (Equipo #04)</h3>
            
            <div class="help-wrap" tabindex="0" aria-haspopup="true" aria-label="Comandos de ayuda">
                <div class="help-button" aria-hidden="true">?</div>

                <div class="help-menu" role="menu" aria-hidden="true">
                    <div class="help-item">FROM (de)</div>
                    <div class="help-item">GOTO (ir a)</div>
                    <div class="help-item">OPTION (opción)</div>
                    <div class="help-item">SET (asignar)</div>
                    <div class="help-item">ADD (añadir)</div>
                    <div class="help-item">READANSWER (leer respuesta)</div>
                    <div class="help-item">DISPLAY (mostrar mensaje)</div>
                    <div class="help-item">DISPLAYEND (mostrar final)</div>
                    <div class="help-item">DISPLAYERROR (mostrar error)</div>
                </div>
            </div>
            <textarea id="codigo-editor" spellcheck="false">
FROM inicio
DISPLAY ¿Quieres puntos gratis?
OPTION(Si por favor, No gracias)

FROM si_por_favor
ADD puntos 100
ADD vida -10
DISPLAY ¡Has ganado 100 puntos pero te cansaste!
DISPLAYEND Fin de la prueba.

FROM no_gracias
ADD puntos 1
ADD vida -95
DISPLAY ¡Error tuyo!
DISPLAYEND Fin.
            </textarea>
            
            <button id="btn-compilar" onclick="compilarYJugar()">⚙️ Compilar y Probar Robustez</button>
            
            <div id="consola-robustez">
                <!-- Aquí aparecerán tus mensajes UX de error -->
            </div>
        </section>
    </div>
    <script src="interpreter.js"></script>
</body>
</html>
